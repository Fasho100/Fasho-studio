<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FASHO STUDIO</title>
<style>
body {margin:0;background:#000;color:#fff;font-family:sans-serif;padding-bottom:30px;}
.header {background:#111;padding:20px;text-align:center;border-bottom:4px solid #FFD700;}
.logo {font-size:34px;color:#FFD700;font-weight:bold;letter-spacing:2px;}
.tabs {display:flex;background:#111;}
.tab {flex:1;padding:18px;text-align:center;font-size:18px;}
.tab.active {background:#FFD700;color:#000;font-weight:bold;}
.container {padding:20px;}
input, button {width:100%;padding:15px;margin:8px 0;border-radius:8px;font-size:17px;}
input {background:#222;border:none;color:white;}
button {background:#FFD700;color:black;border:none;font-weight:bold;}
.status {padding:10px;text-align:center;font-size:15px;color:#FFD700;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">FASHO STUDIO</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">STEP BY STEP</div>
  <div class="tab" onclick="switchTab(1)">DIRECTOR MODE</div>
</div>

<div class="container">
  <input type="text" id="apikey" placeholder="r8_ your Replicate API key">
  <button onclick="saveKey()">SAVE API KEY</button>
  <div id="status" class="status"></div>

  <div id="director" style="display:none;">
    <h2 style="margin-top:30px;">Director Mode</h2>
    <textarea id="prompt" rows="4" style="width:100%;background:#222;color:white;border:none;padding:15px;border-radius:8px;" placeholder="Describe your full music video..."></textarea>
    <button onclick="generate()" style="margin-top:15px;">GENERATE MUSIC VIDEO</button>
  </div>
</div>

<script>
function switchTab(n) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', i===n);
  });
  document.getElementById('director').style.display = (n===1) ? 'block' : 'none';
}

function saveKey() {
  const key = document.getElementById('apikey').value.trim();
  if (!key.startsWith('r8_')) {
    alert("Key must start with r8_");
    return;
  }
  localStorage.setItem('repKey', key);
  document.getElementById('status').innerHTML = '✅ Key saved!';
}

function generate() {
  const key = localStorage.getItem('repKey');
  if (!key) {
    alert("Save your API key first!");
    return;
  }
  alert("🎥 Generation started!\n\n(This is the mobile-friendly version — real video model next if you want it)");
}

window.onload = () => {
  const saved = localStorage.getItem('repKey');
  if (saved) document.getElementById('apikey').value = saved;
};
</script>

</body>
</html>
